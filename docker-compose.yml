services:
  redis:
    image: redis:7-alpine
    container_name: redis
    hostname: redis
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - app-network

  backend:
    build:
      context: ./backend
    env_file:
      - .env
    volumes:
      - ./data:/data
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - app-network
    restart: unless-stopped

  celery-worker:
    build:
      context: ./backend
    command: celery -A tasks.celery_app worker --loglevel=info --concurrency=1
    env_file:
      - .env
    volumes:
      - ./data:/data
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    networks:
      - app-network
    restart: unless-stopped

  celery-beat:
    build:
      context: ./backend
    command: celery -A tasks.celery_app beat --loglevel=info
    env_file:
      - .env
    volumes:
      - ./data:/data
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    expose:
      - "80"
    labels:
      - "traefik.http.services.frontend.loadbalancer.server.port=80"
    depends_on:
      backend:
        condition: service_started
    networks:
      - app-network
    restart: unless-stopped

volumes:
  redis-data:

networks:
  app-network:
    driver: bridge